<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Workshop Registration</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Teacher Attendance & Workshop Registration</h1>
      <p>Workflow 1 prototype: teacher registration, login, workshop signup, and confirmation.</p>
    </header>

    <section id="auth-section" class="card">
      <div class="tabs">
        <button id="show-register" class="active">Register</button>
        <button id="show-login">Login</button>
      </div>

      <div id="register-box" class="panel">
        <h2>Teacher Registration</h2>
        <form id="register-form">
          <label>Name <input name="name" type="text" required /></label>
          <label>MOE Email <input name="email" type="email" required /></label>
          <label>Contact Number <input name="phone" type="tel" required /></label>
          <label>School / Institution <input name="school" type="text" required /></label>
          <label>Grade Level Taught <input name="gradeLevel" type="text" required /></label>
          <button type="submit">Register & Login</button>
        </form>
        <div id="register-message" class="message"></div>
      </div>

      <div id="login-box" class="panel hidden">
        <h2>Teacher Login</h2>
        <form id="login-form">
          <label>MOE Email <input name="email" type="email" required /></label>
          <button type="submit">Login</button>
        </form>
        <div id="login-message" class="message"></div>
      </div>
    </section>

    <section id="app-section" class="hidden">
      <div class="toolbar">
        <div>
          <span id="welcome-text"></span>
          <span id="registration-count"></span>
        </div>
        <button id="logout-button">Logout</button>
      </div>

      <div class="grid">
        <div class="card">
          <h2>Available Workshops</h2>
          <div id="workshops-list"></div>
        </div>

        <div class="card">
          <h2>My Registrations</h2>
          <div id="registered-list"></div>
        </div>
      </div>

      <div id="confirmation-card" class="card hidden">
        <h2>Registration Confirmation</h2>
        <div id="confirmation-details"></div>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
